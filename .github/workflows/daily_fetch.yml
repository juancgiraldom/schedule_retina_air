name: Daily RETINA fetch

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC ≈ 08:00 Madrid time (CEST, summer)
  workflow_dispatch:        # allows manual trigger from the Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed so the job can push data back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install GDAL
        run: sudo apt-get update && sudo apt-get install -y gdal-bin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python script.py

      - name: Commit and push GeoTIFFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/*/time-tifs/
          git diff --staged --quiet || git commit -m "Add RETINA GeoTIFF data for $(date -u +'%Y-%m-%d')"
          git push
